<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航栏响应式测试</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
  }

  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 10000;
    background: #1a1a2e;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .toolbar-label {
    color: #aaa;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .width-btn {
    padding: 8px 16px;
    border: 1.5px solid #444;
    border-radius: 8px;
    background: #2a2a3e;
    color: #ccc;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .width-btn:hover { border-color: #666; color: #fff; }
  .width-btn:active { transform: scale(0.96); }
  .width-btn.active {
    background: #6366f1;
    border-color: #818cf8;
    color: #fff;
    box-shadow: 0 2px 12px rgba(99,102,241,0.4);
  }

  .width-info {
    color: #818cf8;
    font-size: 13px;
    font-weight: 700;
    margin-left: 8px;
  }

  .viewport-wrapper {
    margin: 70px auto 0;
    border: 2px dashed #d0d5dd;
    border-radius: 12px;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(0.23, 1, 0.32, 1);
    background: #fff;
    box-shadow: 0 8px 40px rgba(0,0,0,0.1);
    position: relative;
  }

  .viewport-label {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: #999;
    font-weight: 600;
    white-space: nowrap;
  }

  .viewport-iframe {
    width: 100%;
    height: 780px;
    border: none;
    display: block;
  }

  .legend {
    max-width: 600px;
    margin: 24px auto;
    padding: 16px 20px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    font-size: 12px;
    color: #666;
    line-height: 1.8;
  }
  .legend strong { color: #333; }
  .legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 6px; vertical-align: middle; }
  .legend .dot.d1 { background: #6366f1; }
  .legend .dot.d2 { background: #f59e0b; }
  .legend .dot.d3 { background: #10b981; }
  .legend .dot.d4 { background: #ef4444; }

  .current-size {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 10001;
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    pointer-events: none;
  }
</style>

<script>
  var WIDTHS = [430, 375, 360, 320];
  var currentIndex = 1;

  function switchWidth(index) {
    currentIndex = index;
    var width = WIDTHS[index];
    var wrapper = document.getElementById('viewportWrapper');
    wrapper.style.width = width + 'px';

    var btns = document.querySelectorAll('.width-btn');
    btns.forEach(function(btn, i) {
      btn.classList.toggle('active', i === index);
    });

    document.getElementById('widthInfo').textContent = width + 'px 视口';
    document.getElementById('currentSize').textContent = '当前模拟：' + width + 'px';
  }

  document.addEventListener('DOMContentLoaded', function() {
    switchWidth(1);
  });
</script>
</head>
<body>

<div class="toolbar">
  <span class="toolbar-label">📐 视口宽度</span>
  <button class="width-btn" onclick="switchWidth(0)">430px</button>
  <button class="width-btn" onclick="switchWidth(1)">375px</button>
  <button class="width-btn" onclick="switchWidth(2)">360px</button>
  <button class="width-btn" onclick="switchWidth(3)">320px</button>
  <span class="width-info" id="widthInfo">375px 视口</span>
</div>

<div class="viewport-wrapper" id="viewportWrapper" style="width:375px">
  <iframe class="viewport-iframe" src="index.html"></iframe>
</div>

<div class="legend">
  <strong>📋 验证清单</strong><br><br>
  <span class="dot d1"></span> <strong>430px</strong>（iPhone 14/15 Pro Max）：导航栏高度 54px，导航项 46px，切换按钮 46×46<br>
  <span class="dot d2"></span> <strong>375px</strong>（iPhone SE / iPhone 8 / X）：导航栏高度 48px，导航项 44px，切换按钮 44×44<br>
  <span class="dot d3"></span> <strong>360px</strong>（常见安卓小屏）：导航栏高度 44px，导航项 40px，切换按钮 40×40<br>
  <span class="dot d4"></span> <strong>320px</strong>（iPhone SE 1代）：导航栏高度 40px，导航项 36px，切换按钮 36×36<br><br>
  <strong>✅ 重点检查</strong>：切换按钮与导航栏比例一致、快捷导航面板左右间距合理、所有文字清晰可读
</div>

<div class="current-size" id="currentSize">当前模拟：375px</div>

</body>
</html>
